{{ if and .Values.buildkitd.install .Values.buildkitd.netpol .Values.buildkitd.netpol.buildctlEgress -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anvilops-buildctl-egress
  labels:
    {{- include "anvilops.commonLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "anvilops.buildkitd.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    {{- toYaml .Values.buildkitd.netpol.buildctlEgress | nindent 4 }}
{{- end }}