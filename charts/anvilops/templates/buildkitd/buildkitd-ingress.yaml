{{ if and .Values.buildkitd.install .Values.buildkitd.netpol .Values.buildkitd.netpol.ingress -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anvilops-buildkitd-ingress
  labels:
    {{- include "anvilops.commonLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "anvilops.buildkitd.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- toYaml .Values.buildkitd.netpol.ingress | nindent 4 }}
{{- end }}