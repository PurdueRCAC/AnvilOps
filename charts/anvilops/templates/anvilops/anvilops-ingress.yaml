{{- if .Values.anvilops.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "anvilops.fullname" . }}
  labels:
    {{- include "anvilops.labels" . | nindent 4 }}
  {{- with .Values.anvilops.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.anvilops.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.anvilops.ingress.tls }}
  tls:
    {{- range .Values.anvilops.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.anvilops.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "anvilops.fullname" $ }}
                port:
                  number: {{ $.Values.anvilops.service.port }}
          {{- end }}
    {{- end }}
    # Create an extra entry for custom domain name handling. Custom domains will have a CNAME that points to this domain. When the user
    # visits a custom domain with a properly-configured CNAME, the Ingress controller will proxy the traffic to their app instead of here,
    # but this is still necessary to reserve the name (if the ingress controller prevents duplicate hostnames) and to create a DNS record
    # (in setups where DNS records aren't created for subdomains of the ingress controller's domain without an Ingress resource).
    {{- with .Values.anvilops.env.cnameDomain }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "anvilops.fullname" $ }}
                port:
                  number: {{ $.Values.anvilops.service.port }}
    {{- end }}
{{- end }}
